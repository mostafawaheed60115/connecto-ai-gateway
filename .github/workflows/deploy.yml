name: Deploy AI Gateway

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ai-gateway-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o gateway ./cmd/gateway

      - name: Upload deployment binary
        uses: actions/upload-artifact@v4
        with:
          name: ai-gateway-linux-amd64
          path: gateway
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download deployment binary
        uses: actions/download-artifact@v4
        with:
          name: ai-gateway-linux-amd64

      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload binary to VPS
        shell: bash
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/id_ed25519 -P "$VPS_PORT" gateway \
            "$VPS_USER@$VPS_HOST:$APP_DIR/gateway.new"

      - name: Deploy to VPS
        shell: bash
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" bash -s -- "$APP_DIR" <<'REMOTE_SCRIPT'
          set -euo pipefail

          app_dir="$1"
          cd -- "$app_dir"

          git fetch origin main
          git reset --hard origin/main
          chmod 755 gateway.new
          mv gateway.new gateway

          sudo -n systemctl restart ai-gateway
          sudo -n systemctl is-active --quiet ai-gateway

          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --max-time 5 \
              http://127.0.0.1:4173/healthz > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "AI Gateway health check failed after restart." >&2
          exit 1
          REMOTE_SCRIPT
